version: 2
updates:
  # This repo holds Unraid XML templates and has no package manifests, so
  # github-actions is the only ecosystem with anything to update.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "ci"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    # Action pins are all SHA-pinned (with # vX); group every bump together.
    groups:
      actions-all:
        patterns:
          - "*"
